<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livro de Cadastros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F0;
    --paper-raised:#FFFFFF;
    --ink:#1C1B19;
    --ink-soft:#6B6558;
    --rule:#D8D2C4;
    --rule-strong:#B9B09B;
    --green:#2F5233;
    --green-soft:#E7EEE4;
    --red:#8C3A2B;
    --red-soft:#F4E6E1;
    --accent-gold:#B08A3E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px);
    background-size: 100% 42px;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  ::selection{ background: var(--accent-gold); color:#fff; }

  .app{
    display:none;
    grid-template-columns: 300px 1fr;
    min-height:100vh;
  }
  @media (max-width: 820px){
    .app{ grid-template-columns: 1fr; }
    .sidebar{ position:static; height:auto; border-right:none; border-bottom:1px solid var(--rule-strong); }
  }

  /* Tela de acesso restrito */
  .auth-gate{
    min-height:100vh;
    display:none;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .auth-card{
    background:var(--paper-raised);
    border:1px solid var(--rule-strong);
    border-radius:6px;
    padding:40px 36px;
    max-width:380px;
    width:100%;
    box-shadow: 0 2px 24px rgba(28,27,25,0.06);
  }
  .auth-card .brand-mark{ margin-bottom:20px; }
  .auth-card h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:24px;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .auth-card p.auth-sub{
    color:var(--ink-soft);
    font-size:13.5px;
    margin:0 0 26px;
    line-height:1.5;
  }
  .auth-error{
    color:var(--red);
    font-size:13px;
    margin:10px 0 0;
    min-height:16px;
  }
  .auth-loading{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink-soft);
    font-size:14px;
  }

  /* Sidebar */
  .sidebar{
    background:var(--paper-raised);
    border-right:1px solid var(--rule-strong);
    padding:32px 24px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:4px;
  }
  .brand-mark{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:15px;
    width:30px;height:30px;
    border:1.5px solid var(--ink);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:20px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .brand-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin:0 0 28px 40px;
    letter-spacing:.02em;
  }

  .new-btn{
    width:100%;
    padding:12px 14px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:3px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    letter-spacing:.01em;
    transition: transform .12s ease, background .15s ease;
    margin-bottom:26px;
  }
  .new-btn:hover{ background:var(--green); }
  .new-btn:active{ transform: scale(0.98); }

  .index-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:var(--ink-soft);
    font-weight:600;
    margin:0 0 10px 2px;
  }

  .reg-list{ list-style:none; margin:0; padding:0; }
  .reg-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:11px 10px;
    border-radius:3px;
    cursor:pointer;
    margin-bottom:2px;
    border-left:2px solid transparent;
    transition:background .12s ease, border-color .12s ease;
  }
  .reg-item:hover{ background:var(--paper); }
  .reg-item.active{
    background:var(--green-soft);
    border-left:2px solid var(--green);
  }
  .reg-item-name{
    font-size:14px;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .reg-item-count{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    flex-shrink:0;
    margin-left:8px;
  }
  .empty-index{
    font-size:13px;
    color:var(--ink-soft);
    font-style:italic;
    padding:8px 2px;
  }

  /* Main */
  .main{
    padding:44px 48px 80px;
    max-width:880px;
  }
  @media (max-width: 600px){
    .main{ padding:28px 20px 60px; }
  }

  .eyebrow{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:var(--accent-gold);
    font-weight:700;
    margin:0 0 10px 0;
  }
  h2.title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:34px;
    margin:0 0 8px 0;
    letter-spacing:-0.01em;
    line-height:1.15;
  }
  .subtitle{
    color:var(--ink-soft);
    font-size:14.5px;
    margin:0 0 36px 0;
    max-width:56ch;
    line-height:1.5;
  }

  /* Welcome / empty state */
  .welcome{
    padding-top:8vh;
  }
  .welcome .signature{
    font-family:'Fraunces', serif;
    font-size:15px;
    color:var(--ink-soft);
    font-style:italic;
    border-left:2px solid var(--rule-strong);
    padding-left:16px;
    margin-top:32px;
    max-width:46ch;
    line-height:1.6;
  }

  /* Form */
  .field-label{
    display:block;
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .input{
    width:100%;
    background:var(--paper-raised);
    border:1px solid var(--rule-strong);
    border-radius:3px;
    padding:12px 14px;
    font-family:'Inter',sans-serif;
    font-size:15px;
    color:var(--ink);
    outline:none;
    transition:border-color .12s ease, box-shadow .12s ease;
  }
  .input:focus{
    border-color:var(--green);
    box-shadow:0 0 0 3px var(--green-soft);
  }
  .input.error{
    border-color:var(--red);
    box-shadow:0 0 0 3px var(--red-soft);
  }
  .input-mono{ font-family:'JetBrains Mono', monospace; }

  .title-field{ margin-bottom:32px; max-width:480px; }

  .items-block{ margin-bottom:20px; }
  .items-head{
    display:grid;
    grid-template-columns: 32px 1fr 160px 40px;
    gap:12px;
    padding:0 4px 10px;
    border-bottom:1px solid var(--rule-strong);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    font-weight:600;
  }
  .item-row{
    display:grid;
    grid-template-columns: 32px 1fr 160px 40px;
    gap:12px;
    align-items:start;
    padding:14px 4px;
    border-bottom:1px dashed var(--rule);
  }
  .item-num{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--rule-strong);
    padding-top:12px;
  }
  .remove-btn{
    background:none;
    border:none;
    color:var(--ink-soft);
    cursor:pointer;
    width:32px;height:32px;
    border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    margin-top:2px;
    transition:background .12s ease, color .12s ease;
  }
  .remove-btn:hover{ background:var(--red-soft); color:var(--red); }

  .add-item-btn{
    margin-top:16px;
    background:none;
    border:1px dashed var(--rule-strong);
    color:var(--ink-soft);
    padding:11px 16px;
    border-radius:3px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
    justify-content:center;
    transition:border-color .12s ease, color .12s ease, background .12s ease;
  }
  .add-item-btn:hover{
    border-color:var(--green);
    color:var(--green);
    background:var(--green-soft);
  }

  .form-actions{
    display:flex;
    gap:12px;
    margin-top:36px;
    align-items:center;
  }
  .btn-primary{
    padding:13px 26px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:3px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .btn-primary:hover{ background:var(--green); }
  .btn-secondary{
    padding:13px 22px;
    background:none;
    color:var(--ink-soft);
    border:1px solid var(--rule-strong);
    border-radius:3px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:background .12s ease;
  }
  .btn-secondary:hover{ background:var(--paper); }
  .btn-danger-text{
    margin-left:auto;
    background:none;
    border:none;
    color:var(--red);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .form-error{
    color:var(--red);
    font-size:13px;
    margin-top:14px;
    font-weight:500;
  }

  /* View / ledger */
  .ledger-header-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:28px;
    flex-wrap:wrap;
  }
  .ledger-actions{ display:flex; gap:10px; }
  .icon-btn{
    background:none;
    border:1px solid var(--rule-strong);
    color:var(--ink-soft);
    width:38px;height:38px;
    border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:border-color .12s ease, color .12s ease, background .12s ease;
  }
  .icon-btn:hover{ border-color:var(--ink); color:var(--ink); }
  .icon-btn.danger:hover{ border-color:var(--red); color:var(--red); background:var(--red-soft); }

  .ledger{
    background:var(--paper-raised);
    border:1px solid var(--rule-strong);
    border-radius:5px;
    overflow:hidden;
  }
  .ledger-head{
    display:grid;
    grid-template-columns: 1fr 110px 130px 130px;
    gap:14px;
    padding:14px 20px;
    background:var(--paper);
    border-bottom:1px solid var(--rule-strong);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    font-weight:700;
  }
  .ledger-row{
    display:grid;
    grid-template-columns: 1fr 110px 130px 130px;
    gap:14px;
    padding:16px 20px;
    align-items:center;
    border-bottom:1px dashed var(--rule);
  }
  .ledger-row:last-of-type{ border-bottom:none; }
  .ledger-item-name{
    font-size:15px;
    font-weight:500;
  }
  .ledger-item-unit{
    font-family:'JetBrains Mono', monospace;
    font-size:13.5px;
    color:var(--ink-soft);
  }
  .qty-input{
    width:100%;
    padding:8px 10px;
    border:1px solid var(--rule-strong);
    border-radius:3px;
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    text-align:center;
    outline:none;
    background:var(--paper-raised);
    transition:border-color .12s ease, box-shadow .12s ease;
  }
  .qty-input:focus{
    border-color:var(--green);
    box-shadow:0 0 0 3px var(--green-soft);
  }
  .ledger-item-subtotal{
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    font-weight:600;
    text-align:right;
  }
  .ledger-item-subtotal.zero{ color:var(--ink-soft); font-weight:400; }

  .ledger-total-row{
    display:grid;
    grid-template-columns: 1fr 110px 130px 130px;
    gap:14px;
    padding:20px;
    align-items:center;
    background:var(--green-soft);
    border-top:1.5px solid var(--green);
  }
  .ledger-total-label{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:16px;
    color:var(--green);
    grid-column: 1 / 4;
  }
  .ledger-total-value{
    font-family:'JetBrains Mono', monospace;
    font-size:20px;
    font-weight:700;
    color:var(--green);
    text-align:right;
  }

  .meta-line{
    font-size:12.5px;
    color:var(--ink-soft);
    margin-top:16px;
  }

  .fade-in{ animation: fadeIn .25s ease; }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(4px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="auth-loading" id="authLoading">Carregando...</div>

<div class="auth-gate" id="authGate">
  <div class="auth-card fade-in">
    <div class="brand-mark">C</div>
    <h2>Acesso restrito</h2>
    <p class="auth-sub">Este site é de uso restrito. Informe a senha de acesso para continuar.</p>
    <form id="formLogin">
      <label class="field-label" for="inputSenha">Senha</label>
      <input class="input" id="inputSenha" type="password" placeholder="Digite a senha" autocomplete="current-password" required>
      <p class="auth-error" id="loginErro"></p>
      <button type="submit" class="btn-primary" id="btnEntrar" style="width:100%; margin-top:14px;">Entrar</button>
    </form>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">C</div>
      <h1>Livro de Cadastros</h1>
    </div>
    <p class="brand-sub">planilhas de itens &amp; valores</p>

    <button class="new-btn" id="btnNovo">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Novo cadastro
    </button>

    <p class="index-label">Índice</p>
    <ul class="reg-list" id="regList"></ul>

    <button class="btn-secondary" id="btnSair" style="width:100%; margin-top:24px; font-size:12.5px; padding:9px 14px;">Sair</button>
  </aside>

  <main class="main" id="main"></main>
</div>

<script type="module">
/* ---------- Firebase (Firestore) ----------
   Os cadastros ficam salvos no Firestore e são compartilhados entre
   TODOS os visitantes do site, em tempo real: quando alguém cria, edita
   ou apaga um cadastro, todo mundo vê a atualização na hora, sem precisar
   recarregar a página. */

/* ======================================================================
   CONFIGURAÇÃO — EDITE AQUI ANTES DE PUBLICAR (veja o README)

   1. Crie um projeto em https://console.firebase.google.com
   2. Vá em "Compilação → Firestore Database" → "Criar banco de dados".
   3. Vá em "Compilação → Authentication" → "Vamos começar" → ative o
      provedor "E-mail/senha".
   4. Em "Authentication → Users → Add user", crie UM usuário com um
      e-mail qualquer (ex.: acesso@seusite.com) e a senha que as pessoas
      vão usar para entrar no site. Essa é a "senha do site" — todo mundo
      usa a mesma.
   5. Copie esse e-mail para SITE_ACCESS_EMAIL logo abaixo (tem que ser
      idêntico ao cadastrado no passo 4).
   6. Vá em "Configurações do projeto" (engrenagem) → aba "Geral" → role
      até "Seus aplicativos" → clique no ícone "</>" para adicionar um
      app da Web → copie os valores gerados para FIREBASE_CONFIG abaixo.

   Este trecho pode ficar público no repositório: essas chaves apenas
   identificam o projeto — quem protege os dados de verdade são o login
   e as regras de segurança do Firestore (Passo 3 do README).
   ====================================================================== */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCar9pXybtsDjJllXVZI5goe7jYjbWASb4",
  authDomain: "planilhasbaiano.firebaseapp.com",
  projectId: "planilhasbaiano",
  storageBucket: "planilhasbaiano.firebasestorage.app",
  messagingSenderId: "941511007829",
  appId: "1:941511007829:web:876b9291d7435245cf3edc"
};

// E-mail do usuário único criado no passo 4 acima.
// A senha desse usuário é a senha que as pessoas vão digitar para entrar no site.
const SITE_ACCESS_EMAIL = "baiano@gmail.com";
/* ====================================================================== */

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import {
  getFirestore, collection, doc, setDoc, deleteDoc,
  onSnapshot, query, orderBy
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';

let db = null;
let auth = null;
let planilhasCol = null;
let erroConexao = null;
let unsubscribeFirestore = null;

try{
  const app = initializeApp(FIREBASE_CONFIG);
  db = getFirestore(app);
  auth = getAuth(app);
  planilhasCol = collection(db, 'planilhas');
}catch(e){
  console.error('Falha ao inicializar o Firebase', e);
  erroConexao = 'Não foi possível inicializar o Firebase. Confira a configuração no topo do script.';
}

/* ---------- Acesso restrito (senha compartilhada) ----------
   O login usa um único usuário do Firebase Authentication (e-mail fixo
   definido acima em SITE_ACCESS_EMAIL) e a senha que a pessoa digita. Assim,
   o acesso ao site — e, mais importante, a leitura/escrita no Firestore —
   só funciona para quem souber a senha, já que as regras do Firestore
   exigem "request.auth != null" (veja o README). */

function mostrarCarregando(){
  document.getElementById('authLoading').style.display = 'flex';
  document.getElementById('authGate').style.display = 'none';
  document.querySelector('.app').style.display = 'none';
}

function mostrarLogin(mensagemErro){
  document.getElementById('authLoading').style.display = 'none';
  document.getElementById('authGate').style.display = 'flex';
  document.querySelector('.app').style.display = 'none';
  document.getElementById('loginErro').textContent = mensagemErro || '';
}

function mostrarApp(){
  document.getElementById('authLoading').style.display = 'none';
  document.getElementById('authGate').style.display = 'none';
  document.querySelector('.app').style.display = 'grid';
}

function pararSincronizacao(){
  if(unsubscribeFirestore){ unsubscribeFirestore(); unsubscribeFirestore = null; }
  planilhas = [];
  carregado = false;
  telaAtual = { tipo:'boas-vindas' };
}

if(auth){
  onAuthStateChanged(auth, (user)=>{
    if(user){
      mostrarApp();
      iniciarSincronizacao();
    } else {
      pararSincronizacao();
      mostrarLogin();
    }
  });

  document.getElementById('formLogin').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const senha = document.getElementById('inputSenha').value;
    const btn = document.getElementById('btnEntrar');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    document.getElementById('loginErro').textContent = '';
    try{
      await signInWithEmailAndPassword(auth, SITE_ACCESS_EMAIL, senha);
      document.getElementById('inputSenha').value = '';
    }catch(err){
      console.error('Falha no login', err);
      document.getElementById('loginErro').textContent = 'Senha incorreta. Tente novamente.';
    }
    btn.disabled = false;
    btn.textContent = 'Entrar';
  });

  document.getElementById('btnSair').addEventListener('click', ()=> signOut(auth));
} else {
  mostrarLogin('Firebase não está configurado corretamente.');
}

/* ---------- Estado ---------- */
let planilhas = [];
let carregado = false;
let telaAtual = { tipo: 'boas-vindas' }; // 'boas-vindas' | 'criar' | 'editar' | 'ver'
let rascunho = null; // { id, nome, itens: [{id,nome,valor}] }
let quantidades = {}; // usado na tela "ver": itemId -> qty (local, não sincronizado)

function iniciarSincronizacao(){
  if(!planilhasCol) { carregado = true; render(); return; }
  if(unsubscribeFirestore) return; // já está ouvindo
  unsubscribeFirestore = onSnapshot(
    query(planilhasCol, orderBy('criadoEm', 'asc')),
    (snapshot)=>{
      erroConexao = null;
      carregado = true;
      planilhas = snapshot.docs.map(d=>({ id:d.id, ...d.data() }));
      render();
    },
    (err)=>{
      console.error('Falha ao sincronizar com o Firestore', err);
      erroConexao = 'Não foi possível conectar ao Firestore. Confira a configuração no topo do script e as regras de segurança (veja o README).';
      carregado = true;
      render();
    }
  );
}

function uid(){
  return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
}

function formatarMoeda(v){
  return v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}

/* ---------- Navegação ---------- */
function irParaCriar(){
  rascunho = { id: uid(), nome:'', itens:[ {id:uid(), nome:'', valor:''}, {id:uid(), nome:'', valor:''} ] };
  telaAtual = { tipo:'criar', erro:null };
  render();
}

function irParaEditar(planilhaId){
  const p = planilhas.find(x=>x.id===planilhaId);
  if(!p) return;
  rascunho = { id:p.id, nome:p.nome, itens: p.itens.map(i=>({...i, valor:String(i.valor)})) };
  telaAtual = { tipo:'editar', erro:null };
  render();
}

function irParaVer(planilhaId){
  quantidades = {};
  telaAtual = { tipo:'ver', planilhaId };
  render();
}

/* ---------- Ações de rascunho (criar/editar) ---------- */
function adicionarItemRascunho(){
  rascunho.itens.push({ id:uid(), nome:'', valor:'' });
  render();
}
function removerItemRascunho(itemId){
  rascunho.itens = rascunho.itens.filter(i=>i.id!==itemId);
  render();
}
function atualizarNomeCadastro(v){
  rascunho.nome = v;
}
function atualizarItem(itemId, campo, valor){
  const it = rascunho.itens.find(i=>i.id===itemId);
  if(it) it[campo] = valor;
}

function validarRascunho(){
  if(!rascunho.nome || !rascunho.nome.trim()){
    return 'Dê um nome a este cadastro antes de salvar.';
  }
  if(rascunho.itens.length === 0){
    return 'Adicione ao menos um item.';
  }
  for(const it of rascunho.itens){
    if(!it.nome || !it.nome.trim()){
      return 'Todo item precisa de um nome.';
    }
    const num = parseFloat(String(it.valor).replace(',', '.'));
    if(it.valor === '' || isNaN(num) || num < 0){
      return `Informe um valor válido para "${it.nome.trim()}".`;
    }
  }
  return null;
}

async function salvarRascunho(){
  const erro = validarRascunho();
  if(erro){
    telaAtual.erro = erro;
    render();
    return;
  }
  if(!planilhasCol){
    telaAtual.erro = 'Firebase não está configurado. Confira a configuração no topo do script.';
    render();
    return;
  }
  const itensLimpos = rascunho.itens.map(i=>({
    id:i.id,
    nome:i.nome.trim(),
    valor: parseFloat(String(i.valor).replace(',', '.'))
  }));
  const jaExiste = planilhas.some(p=>p.id===rascunho.id);
  const dados = { nome: rascunho.nome.trim(), itens: itensLimpos };
  if(!jaExiste) dados.criadoEm = Date.now();

  try{
    await setDoc(doc(db, 'planilhas', rascunho.id), dados, { merge:true });
    irParaVer(rascunho.id);
  }catch(e){
    console.error('Falha ao salvar no Firestore', e);
    telaAtual.erro = 'Não foi possível salvar. Verifique sua conexão e as regras do Firestore.';
    render();
  }
}

async function excluirPlanilha(id){
  const p = planilhas.find(x=>x.id===id);
  if(!p) return;
  if(!confirm(`Excluir o cadastro "${p.nome}"? Esta ação não pode ser desfeita e vale para todos os usuários.`)) return;
  try{
    await deleteDoc(doc(db, 'planilhas', id));
    telaAtual = { tipo:'boas-vindas' };
    render();
  }catch(e){
    console.error('Falha ao excluir no Firestore', e);
    alert('Não foi possível excluir. Verifique sua conexão e as regras do Firestore.');
  }
}

/* ---------- Render ---------- */
function render(){
  renderSidebar();
  renderMain();
}

function renderSidebar(){
  const list = document.getElementById('regList');

  if(erroConexao){
    list.innerHTML = `<li class="empty-index" style="color:var(--red);">${escapeHtml(erroConexao)}</li>`;
    return;
  }
  if(!carregado){
    list.innerHTML = `<li class="empty-index">Sincronizando...</li>`;
    return;
  }
  if(planilhas.length === 0){
    list.innerHTML = `<li class="empty-index">Nenhum cadastro ainda.</li>`;
    return;
  }
  list.innerHTML = planilhas.map(p=>{
    const ativo = (telaAtual.tipo==='ver' && telaAtual.planilhaId===p.id) ? 'active' : '';
    return `<li class="reg-item ${ativo}" data-id="${p.id}">
      <span class="reg-item-name">${escapeHtml(p.nome)}</span>
      <span class="reg-item-count">${p.itens.length} ${p.itens.length===1?'item':'itens'}</span>
    </li>`;
  }).join('');
  list.querySelectorAll('.reg-item').forEach(el=>{
    el.addEventListener('click', ()=> irParaVer(el.dataset.id));
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderMain(){
  const main = document.getElementById('main');
  if(telaAtual.tipo === 'boas-vindas'){
    main.innerHTML = telaBoasVindas();
  } else if(telaAtual.tipo === 'criar' || telaAtual.tipo === 'editar'){
    main.innerHTML = telaFormulario(telaAtual.tipo);
    ligarEventosFormulario();
  } else if(telaAtual.tipo === 'ver'){
    main.innerHTML = telaVisualizar(telaAtual.planilhaId);
    ligarEventosVisualizar(telaAtual.planilhaId);
  }
}

function telaBoasVindas(){
  return `
  <div class="welcome fade-in">
    <p class="eyebrow">Página 1</p>
    <h2 class="title">Cada cadastro,<br>uma planilha própria.</h2>
    <p class="subtitle">Crie um cadastro com o nome e o valor de cada item. Depois, abra a página de visualização para lançar quantidades e ver o total calculado na hora.</p>
    <button class="btn-primary" id="btnComecar">Começar um novo cadastro</button>
    <p class="signature">"Um bom livro de registros não esconde as contas — ele as deixa claras, linha por linha."</p>
  </div>`;
}

function telaFormulario(tipo){
  const titulo = tipo === 'criar' ? 'Novo cadastro' : `Editando "${escapeHtml(rascunho.nome || '')}"`;
  const eyebrow = tipo === 'criar' ? 'Novo registro' : 'Edição de registro';
  return `
  <div class="fade-in">
    <p class="eyebrow">${eyebrow}</p>
    <h2 class="title">${titulo}</h2>
    <p class="subtitle">Dê um nome ao cadastro e informe nome e valor de cada item. Você pode adicionar quantos itens quiser.</p>

    <div class="title-field">
      <label class="field-label">Nome do cadastro</label>
      <input class="input" id="inpNomeCadastro" type="text" placeholder="Ex.: Estoque da loja, Lista de compras..." value="${escapeHtml(rascunho.nome)}">
    </div>

    <div class="items-block">
      <div class="items-head">
        <span>#</span>
        <span>Nome do item</span>
        <span>Valor (R$)</span>
        <span></span>
      </div>
      <div id="itensContainer">
        ${rascunho.itens.map((it, idx)=>itemRowHtml(it, idx)).join('')}
      </div>
    </div>

    <button class="add-item-btn" id="btnAddItem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Adicionar item
    </button>

    ${telaAtual.erro ? `<p class="form-error">${escapeHtml(telaAtual.erro)}</p>` : ''}

    <div class="form-actions">
      <button class="btn-primary" id="btnSalvar">Salvar cadastro</button>
      <button class="btn-secondary" id="btnCancelar">Cancelar</button>
      ${tipo==='editar' ? `<button class="btn-danger-text" id="btnExcluir">Excluir este cadastro</button>` : ''}
    </div>
  </div>`;
}

function itemRowHtml(it, idx){
  return `
  <div class="item-row" data-item-id="${it.id}">
    <span class="item-num">${String(idx+1).padStart(2,'0')}</span>
    <input class="input" data-campo="nome" type="text" placeholder="Nome do item" value="${escapeHtml(it.nome)}">
    <input class="input input-mono" data-campo="valor" type="text" inputmode="decimal" placeholder="0,00" value="${escapeHtml(it.valor)}">
    <button class="remove-btn" data-remove="${it.id}" title="Remover item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>`;
}

function ligarEventosFormulario(){
  const btnComecar = document.getElementById('btnComecar');
  if(btnComecar) btnComecar.addEventListener('click', irParaCriar);

  const inpNome = document.getElementById('inpNomeCadastro');
  if(inpNome) inpNome.addEventListener('input', e=> atualizarNomeCadastro(e.target.value));

  document.querySelectorAll('#itensContainer .item-row').forEach(row=>{
    const itemId = row.dataset.itemId;
    row.querySelectorAll('input[data-campo]').forEach(inp=>{
      inp.addEventListener('input', e=> atualizarItem(itemId, e.target.dataset.campo, e.target.value));
    });
    const rem = row.querySelector('[data-remove]');
    rem.addEventListener('click', ()=> removerItemRascunho(itemId));
  });

  const btnAdd = document.getElementById('btnAddItem');
  if(btnAdd) btnAdd.addEventListener('click', adicionarItemRascunho);

  const btnSalvar = document.getElementById('btnSalvar');
  if(btnSalvar) btnSalvar.addEventListener('click', salvarRascunho);

  const btnCancelar = document.getElementById('btnCancelar');
  if(btnCancelar) btnCancelar.addEventListener('click', ()=>{
    if(telaAtual.tipo==='editar'){
      irParaVer(rascunho.id);
    } else {
      telaAtual = { tipo:'boas-vindas' };
      render();
    }
  });

  const btnExcluir = document.getElementById('btnExcluir');
  if(btnExcluir) btnExcluir.addEventListener('click', ()=> excluirPlanilha(rascunho.id));
}

function telaVisualizar(planilhaId){
  const p = planilhas.find(x=>x.id===planilhaId);
  if(!p){
    return `<div class="fade-in"><p class="subtitle">Este cadastro não foi encontrado.</p></div>`;
  }
  let total = 0;
  const linhas = p.itens.map(it=>{
    const qty = quantidades[it.id] || 0;
    const subtotal = qty * it.valor;
    total += subtotal;
    return `
    <div class="ledger-row">
      <span class="ledger-item-name">${escapeHtml(it.nome)}</span>
      <span class="ledger-item-unit">${formatarMoeda(it.valor)}</span>
      <input class="qty-input" type="number" min="0" step="1" placeholder="0" data-qty-id="${it.id}" value="${quantidades[it.id] ?? ''}">
      <span class="ledger-item-subtotal ${subtotal===0?'zero':''}">${formatarMoeda(subtotal)}</span>
    </div>`;
  }).join('');

  return `
  <div class="fade-in">
    <p class="eyebrow">Visualização</p>
    <div class="ledger-header-row">
      <div>
        <h2 class="title" style="margin-bottom:0;">${escapeHtml(p.nome)}</h2>
        <p class="meta-line">${p.itens.length} ${p.itens.length===1?'item cadastrado':'itens cadastrados'}</p>
      </div>
      <div class="ledger-actions">
        <button class="icon-btn" id="btnEditarView" title="Editar cadastro">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn danger" id="btnExcluirView" title="Excluir cadastro">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/></svg>
        </button>
      </div>
    </div>
    <p class="subtitle">Informe a quantidade de cada item. O total é calculado automaticamente (valor × quantidade).</p>

    <div class="ledger">
      <div class="ledger-head">
        <span>Item</span>
        <span>Valor unit.</span>
        <span>Qtd.</span>
        <span style="text-align:right;">Subtotal</span>
      </div>
      ${linhas}
      <div class="ledger-total-row">
        <span class="ledger-total-label">Total geral</span>
        <span class="ledger-total-value" id="totalGeral">${formatarMoeda(total)}</span>
      </div>
    </div>
  </div>`;
}

function ligarEventosVisualizar(planilhaId){
  const p = planilhas.find(x=>x.id===planilhaId);
  if(!p) return;

  document.querySelectorAll('[data-qty-id]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const id = e.target.dataset.qtyId;
      const val = parseFloat(e.target.value);
      quantidades[id] = isNaN(val) || val < 0 ? 0 : val;
      atualizarTotaisView(p);
    });
  });

  const btnEditar = document.getElementById('btnEditarView');
  if(btnEditar) btnEditar.addEventListener('click', ()=> irParaEditar(planilhaId));

  const btnExcluir = document.getElementById('btnExcluirView');
  if(btnExcluir) btnExcluir.addEventListener('click', ()=> excluirPlanilha(planilhaId));
}

function atualizarTotaisView(p){
  let total = 0;
  p.itens.forEach(it=>{
    const qty = quantidades[it.id] || 0;
    const subtotal = qty * it.valor;
    total += subtotal;
    const row = document.querySelector(`[data-qty-id="${it.id}"]`).closest('.ledger-row');
    const subEl = row.querySelector('.ledger-item-subtotal');
    subEl.textContent = formatarMoeda(subtotal);
    subEl.classList.toggle('zero', subtotal===0);
  });
  document.getElementById('totalGeral').textContent = formatarMoeda(total);
}

/* ---------- Início ---------- */
document.getElementById('btnNovo').addEventListener('click', irParaCriar);
if(!auth) mostrarCarregando(); // fallback improvável (Firebase não inicializou)
</script>
</body>
</html>
